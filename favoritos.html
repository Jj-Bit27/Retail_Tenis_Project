    <div class="grid-cards" id="favoritesGrid"></div>

<footer>

<script src="Scripts/tenis.js"></script>
<script>
    (function() {
        function getFavorites() { return JSON.parse(localStorage.getItem('favorites') || '[]'); }

        function renderFavorites() {
            var favIds = getFavorites();
            var grid = document.getElementById('favoritesGrid');
            if (!grid) return;
            if (favIds.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--texto-desc);">No tienes favoritos aún</p>';
                return;
            }
            var favProducts = [];
            for (var i = 0; i < products.length; i++) {
                for (var j = 0; j < favIds.length; j++) {
                    if (products[i].id === favIds[j]) { favProducts.push(products[i]); break; }
                }
            }
            for (var k = 0; k < favProducts.length; k++) {
                var p = favProducts[k];
                var card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = '<img src="' + p.imagen + '" alt="' + p.nombre + '"><p><strong>' + p.nombre + '</strong></p><p style="color:var(--acento); font-weight:bold;">$' + p.precio.toLocaleString() + '</p><button onclick="window.removeFav(\'' + p.id + '\')" style="background:none; border:1px solid var(--borde); padding:0.5rem 1rem; border-radius:8px; margin-top:0.5rem; cursor:pointer;">Eliminar</button>';
                (function(id) { card.onclick = function(e) { if (e.target.tagName !== 'BUTTON') window.location.href = 'productoDetalle.html?id=' + id; }; })(p.id);
                grid.appendChild(card);
            }
        }

        window.removeFav = function(id) {
            var favs = getFavorites();
            var newFavs = [];
            for (var i = 0; i < favs.length; i++) { if (favs[i] !== id) newFavs.push(favs[i]); }
            localStorage.setItem('favorites', JSON.stringify(newFavs));
            document.getElementById('favoritesGrid').innerHTML = '';
            renderFavorites();
        };

        renderFavorites();
    })();
</script>
<script>function toggleMenu(){var p=document.getElementById("mobilePanel"),o=document.getElementById("mobileOverlay");if(p.classList.contains("active")){p.classList.remove("active");o.classList.remove("active")}else{p.classList.add("active");o.classList.add("active")}}</script>
