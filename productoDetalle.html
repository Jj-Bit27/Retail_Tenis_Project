            <li><a href="index.html">Inicio</a></li>

            <li><a href="categorias.html">Categorías</a></li>
            <li><a href="marcas.html">Marcas</a></li>
            <li><a href="login.html">Iniciar Sesión</a></li>
            <li><a href="registro.html">Registro</a></li>
            <li><a href="carrito.html" class="nav-cart">Carrito</a></li>

    </nav>

</header>
<div class="mobile-overlay" id="mobileOverlay" onclick="toggleMenu()"></div>

  <div class="mobile-panel-header">
    <span>Menú</span>
    <span class="mobile-close" onclick="toggleMenu()">×</span>
  </div>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="productos.html">Productos</a>
    <a href="categorias.html">Categorías</a>

    <a href="carrito.html" class="nav-cart">Carrito</a>
  </nav>
</div>

<main class="container">
    <div id="productDetail"></div>
</main>

<footer>
    <h3><img src="Images/Papos_mx.png" alt="PaposMX" class="footer-logo"> PaposMX</h3>
    <p>Tu tienda de confianza para los mejores tenis del mercado.</p>
    <p class="copy">© 2026 PaposMX Inc.</p>
</footer>

<script src="Scripts/tenis.js"></script>
<script>
    (function() {
        var id = new URLSearchParams(window.location.search).get('id');
        var product = null;
        for (var i = 0; i < products.length; i++) {
            if (products[i].id === id) { product = products[i]; break; }
        }

        var container = document.getElementById('productDetail');
        if (!container) return;

        if (!product) {
            container.innerHTML = '<p style="text-align:center; padding:2rem; color:var(--texto-desc);">Producto no encontrado</p>';
            return;
        }

        var tallasOptions = '';
        for (var t = 0; t < product.talla.length; t++) {
            tallasOptions += '<option value="' + product.talla[t] + '">Talla ' + product.talla[t] + '</option>';
        }

        var coloresHtml = '';
        for (var c = 0; c < product.colores.length; c++) {
            coloresHtml += '<span style="border:1px solid var(--borde); padding:0.5rem 1rem; border-radius:12px; display:inline-block; background:var(--fondo-principal);">' + product.colores[c] + '</span>';
        }

        container.innerHTML =
            '<div style="display:grid; grid-template-columns:1fr 1fr; gap:3rem; align-items:start;">' +
                '<div><img src="' + product.imagen + '" alt="' + product.nombre + '" style="width:100%; border-radius:20px; background:var(--blanco); padding:1rem;"></div>' +
                '<div>' +
                    '<h1 style="font-size:1.8rem;">' + product.nombre + '</h1>' +
                    '<p style="font-size:2rem; color:var(--acento); font-weight:bold; margin:1rem 0;">$' + product.precio.toLocaleString() + '</p>' +
                    '<p style="margin:1rem 0; color:var(--texto-desc); line-height:1.6;">' + product.descripcion + '</p>' +
                    '<p style="margin-bottom:0.5rem;"><strong>Marca:</strong> ' + product.marca + '</p>' +
                    '<p style="margin-bottom:1.5rem;"><strong>Categoría:</strong> ' + product.categoria + '</p>' +
                    '<div class="form-group" style="margin-bottom:1.5rem;"><label><strong>Talla</strong></label><select id="tallaSelect">' + tallasOptions + '</select></div>' +
                    '<div style="margin-bottom:1.5rem;"><p style="margin-bottom:0.5rem;"><strong>Color:</strong></p><div style="display:flex; gap:0.5rem; flex-wrap:wrap;">' + coloresHtml + '</div></div>' +
                    '<button class="btn-primary" style="width:100%;" onclick="window.addToCart(\'' + product.id + '\')">Añadir al Carrito</button>' +
                '</div>' +
            '</div>';

        window.addToCart = function(id) {
            var cart = JSON.parse(localStorage.getItem('cart') || '[]');
            var found = false;
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === id) { cart[i].cantidad = (cart[i].cantidad || 1) + 1; found = true; break; }
            }
            if (!found) cart.push({ id: id, cantidad: 1 });
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Producto añadido al carrito');
        };
    })();
</script>
<script>function toggleMenu(){var p=document.getElementById("mobilePanel"),o=document.getElementById("mobileOverlay");if(p.classList.contains("active")){p.classList.remove("active");o.classList.remove("active")}else{p.classList.add("active");o.classList.add("active")}}</script>
</body>
</html>
