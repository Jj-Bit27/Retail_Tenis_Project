    </nav>

</header>
<div class="mobile-overlay" id="mobileOverlay" onclick="toggleMenu()"></div>
<div class="mobile-panel" id="mobilePanel">
  <div class="mobile-panel-header">
    <span>Menú</span>
    <span class="mobile-close" onclick="toggleMenu()">×</span>
  </div>
  <nav>
    <a href="index.html">Inicio</a>

    <a href="registro.html">Registro</a>

  </nav>
</div>

<main class="container">
    <h1 class="page-title">Productos</h1>

    <div style="text-align: center; margin-bottom: 2rem;">
        <input type="text" id="searchInput" placeholder="Buscar productos..." class="search-input">
    </div>

    <div class="grid-cards" id="productsGrid"></div>
</main>

<footer>
    <h3><img src="Images/Papos_mx.png" alt="PaposMX" class="footer-logo"> PaposMX</h3>
    <p>Tu tienda de confianza para los mejores tenis del mercado.</p>
    <p class="copy">© 2026 PaposMX Inc.</p>
</footer>

<script src="Scripts/tenis.js"></script>
<script>
    (function() {
        var params = { marca: null, categoria: null };
        var sp = new URLSearchParams(window.location.search);
        params.marca = sp.get('marca');
        params.categoria = sp.get('cat') || sp.get('categoria');

        function filterProducts(searchTerm, marca, categoria) {
            return products.filter(function(p) {
                var ms = !searchTerm || p.nombre.toLowerCase().includes(searchTerm.toLowerCase()) || p.marca.toLowerCase().includes(searchTerm.toLowerCase());
                var mm = !marca || p.marca.toLowerCase() === marca.toLowerCase();
                var mc = !categoria || p.categoria.toLowerCase() === categoria.toLowerCase();
                return ms && mm && mc;
            });
        }

        function renderProducts(filtered) {
            var grid = document.getElementById('productsGrid');
            if (!grid) return;
            grid.innerHTML = '';
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:2rem; color:var(--texto-desc);">No se encontraron productos</p>';
                return;
            }
            for (var i = 0; i < filtered.length; i++) {
                var p = filtered[i];
                var card = document.createElement('div');
                card.className = 'card';
                (function(id) { card.onclick = function() { window.location.href = 'productoDetalle.html?id=' + id; }; })(p.id);
                card.innerHTML = '<img src="' + p.imagen + '" alt="' + p.nombre + '"><p><strong>' + p.nombre + '</strong></p><p style="color:var(--acento); font-weight:bold;">$' + p.precio.toLocaleString() + '</p><p style="font-size:0.85rem; color:var(--texto-desc);">' + p.marca + ' • ' + p.categoria + '</p>';
                grid.appendChild(card);
            }
        }

        var currentFiltered = filterProducts('', params.marca, params.categoria);
        renderProducts(currentFiltered);

        var searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', function(e) {
                currentFiltered = filterProducts(e.target.value, params.marca, params.categoria);
                renderProducts(currentFiltered);
            });
        }
    })();
</script>
<script>function toggleMenu(){var p=document.getElementById("mobilePanel"),o=document.getElementById("mobileOverlay");if(p.classList.contains("active")){p.classList.remove("active");o.classList.remove("active")}else{p.classList.add("active");o.classList.add("active")}}</script>
</body>
</html>
